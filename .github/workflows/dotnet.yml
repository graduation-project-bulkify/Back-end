
name: .NET

on:
  push:
    branches: [ "*" ] 
  pull_request:
    branches: ["*"]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: get pwd
      run: pwd
    - name: get ls
      run: ls
    - name: Restore dependencies
      run: dotnet restore ./Bulkify/Bulkify.sln
    - name: Build
      run: dotnet build --no-restore ./Bulkify/Bulkify.sln
